# ================================
# NGINX CONFIG FOR API SUBDOMAINS
# Place this file at:
#   /etc/nginx/sites-available/api
# Then enable it:
#   ln -s /etc/nginx/sites-available/api /etc/nginx/sites-enabled/
#   nginx -t && systemctl restart nginx
# ================================

# Production API — api.madrasadarularqam.org → port 5000
server {
    listen 80;
    server_name api.madrasadarularqam.org;

    # Security headers
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# Staging API — api-staging.madrasadarularqam.org → port 5001
server {
    listen 80;
    server_name api-staging.madrasadarularqam.org;

    add_header X-Frame-Options "DENY";
